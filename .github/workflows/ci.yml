name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-tiny-models-v1

      - name: Install
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src tests scripts experiments

      - name: Tests
        run: uv run pytest -q
        env:
          TOKENIZERS_PARALLELISM: "false"
          HF_HUB_DISABLE_PROGRESS_BARS: "1"
